name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run check
      - name: Test CLI threshold behavior
        run: |
          node dist/index.js --version
          node dist/index.js scan . --quiet --threshold 0

  action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run repository Action bundle
        id: codediag
        uses: ./
        with:
          threshold: 0
          report: codediag-action-report.json
          sarif: codediag-action-report.sarif
      - name: Validate Action outputs
        env:
          CODEDIAG_SCORE: ${{ steps.codediag.outputs.score }}
          CODEDIAG_GRADE: ${{ steps.codediag.outputs.grade }}
          CODEDIAG_REPORT: ${{ steps.codediag.outputs.report }}
          CODEDIAG_SARIF: ${{ steps.codediag.outputs.sarif }}
        run: |
          test "$CODEDIAG_SCORE" -ge 0
          test -n "$CODEDIAG_GRADE"
          test "$CODEDIAG_REPORT" = "$GITHUB_WORKSPACE/codediag-action-report.json"
          test -s "$CODEDIAG_REPORT"
          test "$CODEDIAG_SARIF" = "$GITHUB_WORKSPACE/codediag-action-report.sarif"
          test -s "$CODEDIAG_SARIF"
          node -e 'const fs=require("fs"); const s=JSON.parse(fs.readFileSync(process.env.CODEDIAG_SARIF,"utf8")); if(s.version!=="2.1.0" || s.runs[0].tool.driver.name!=="CodeDiag") process.exit(1)'

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm ci
      - run: npm run extension:package
      - uses: actions/upload-artifact@v7
        with:
          name: codediag-vscode
          path: artifacts/*.vsix
          if-no-files-found: error
