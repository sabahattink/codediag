name: Feature request
description: Propose a focused analyzer or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What engineering risk or workflow gap should CodeDiag detect or solve?
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Proposed behavior
      description: Describe the expected finding, score impact, output, or CLI behavior.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Include representative positive and negative code examples when possible.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API health
        - Security
        - Dependencies
        - Testing
        - Structure
        - CLI and reporters
        - CI integration
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement or test this change.
