name: Bug report
description: Report a reproducible CodeDiag failure or incorrect result.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Use GitHub private vulnerability reporting instead.
  - type: input
    id: version
    attributes:
      label: CodeDiag version
      description: Run `codediag --version` or provide the commit SHA.
      placeholder: 0.2.0
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Node.js version
      options:
        - Node.js 18
        - Node.js 20
        - Node.js 22
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest project or steps that reproduce the problem.
      placeholder: |
        1. Run ...
        2. Scan ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and output
      description: Remove credentials and private source code before pasting output.
    validations:
      required: true
  - type: dropdown
    id: stack
    attributes:
      label: Project stack
      multiple: true
      options:
        - NestJS
        - Express
        - Next.js
        - Node.js
        - Other
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, package manager, and other relevant details.
